# 4 Charles Prime Rib – Resy availability checker
# Runs daily at 9:00 AM ET. 3 tries, 10 seconds apart. Always sends you an email (success, no slots, or error).

name: Resy 4 Charles Check

on:
  schedule:
    # 9:00 AM Eastern: 13:00 UTC (EDT) and 14:00 UTC (EST)
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: # run manually for testing

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check Resy availability (3 tries, 10s apart from 9:00)
        id: resy
        continue-on-error: true
        env:
          RESY_API_KEY: ${{ secrets.RESY_API_KEY }}
          RESY_AUTH_TOKEN: ${{ secrets.RESY_AUTH_TOKEN }}
        run: |
          available=false
          for i in $(seq 1 3); do
            echo "Attempt $i at $(date -u +%H:%M:%S) UTC"
            node check-resy.mjs > result.json
            cat result.json
            if jq -e '.available == true' result.json 2>/dev/null; then
              available=true
              echo "Slots found on attempt $i"
              break
            fi
            if [ $i -lt 3 ]; then sleep 10; fi
          done
          echo "available=$available" >> $GITHUB_OUTPUT
          echo "slots<<EOF" >> $GITHUB_OUTPUT
          jq -r '(.slots // [])[] | "\(.date) \(.time)"' result.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email (slots available)
        if: always() && steps.resy.outcome == 'success' && steps.resy.outputs.available == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.SMTP_USER }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "4 Charles Prime Rib – Slots available"
          body: |
            Slots are available for 4 Charles Prime Rib (4 people).

            Book now: https://resy.com/cities/new-york-ny/venues/4-charles-prime-rib?seats=4

            Slots found:
            ${{ steps.resy.outputs.slots }}

            (Resy 4 Charles checker – GitHub Actions)

      - name: Send email (no slots)
        if: always() && steps.resy.outcome == 'success' && steps.resy.outputs.available != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.SMTP_USER }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "4 Charles Prime Rib – No slots this run"
          body: |
            No availability found for 4 Charles Prime Rib (4 people) in this run.

            Checked 3 times (10s apart). Next run tomorrow at 9:00 AM ET.

            (Resy 4 Charles checker – GitHub Actions)

      - name: Send email (error)
        if: always() && steps.resy.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.SMTP_USER }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "4 Charles Prime Rib – Checker error"
          body: |
            The Resy checker hit an error (script or API failure).

            Check the workflow run for details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            You may need to refresh your RESY_AUTH_TOKEN in repo Secrets.

            (Resy 4 Charles checker – GitHub Actions)
